<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F2A"/>
      <stop offset="100%" stop-color="#0F2E38"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F9D77"/>
      <stop offset="100%" stop-color="#E8B23D"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- subtle grid texture -->
  <g opacity="0.06" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <rect x="0" y="0" width="10" height="300" fill="url(#accentBar)"/>

  <text x="60" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" fill="#F4F1EA">
    AI Platform Model
  </text>
  <text x="60" y="172" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#9FB8B0" letter-spacing="0.5">
    Multi-tenant SaaS foundation — Next.js · Supabase · Paystack · 8 AI providers
  </text>

  <!-- stack chips -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0B1F2A" font-weight="600">
    <rect x="60" y="210" width="110" height="34" rx="17" fill="#1F9D77"/>
    <text x="80" y="232">Next.js 14</text>

    <rect x="182" y="210" width="120" height="34" rx="17" fill="#E8B23D"/>
    <text x="200" y="232">Supabase</text>

    <rect x="314" y="210" width="110" height="34" rx="17" fill="#1F9D77"/>
    <text x="332" y="232">Paystack</text>

    <rect x="436" y="210" width="130" height="34" rx="17" fill="#E8B23D"/>
    <text x="452" y="232">TypeScript</text>

    <rect x="578" y="210" width="150" height="34" rx="17" fill="#1F9D77"/>
    <text x="594" y="232">Multi-AI Layer</text>
  </g>

  <!-- decorative node graph on right, echoes AI-provider fan-out -->
  <g stroke="#1F9D77" stroke-width="1.5" opacity="0.7" fill="none">
    <circle cx="1040" cy="150" r="10" fill="#E8B23D" stroke="none"/>
    <line x1="1040" y1="150" x2="950" y2="90"/>
    <line x1="1040" y1="150" x2="950" y2="130"/>
    <line x1="1040" y1="150" x2="950" y2="170"/>
    <line x1="1040" y1="150" x2="950" y2="210"/>
    <line x1="1040" y1="150" x2="1130" y2="90"/>
    <line x1="1040" y1="150" x2="1130" y2="130"/>
    <line x1="1040" y1="150" x2="1130" y2="170"/>
    <line x1="1040" y1="150" x2="1130" y2="210"/>
  </g>
  <g fill="#F4F1EA" opacity="0.9">
    <circle cx="950" cy="90" r="5"/>
    <circle cx="950" cy="130" r="5"/>
    <circle cx="950" cy="170" r="5"/>
    <circle cx="950" cy="210" r="5"/>
    <circle cx="1130" cy="90" r="5"/>
    <circle cx="1130" cy="130" r="5"/>
    <circle cx="1130" cy="170" r="5"/>
    <circle cx="1130" cy="210" r="5"/>
  </g>
</svg>
