<svg viewBox="0 0 1100 640" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5B7268"/>
    </marker>
  </defs>
  <rect width="1100" height="640" fill="#F7F4EE"/>

  <!-- Client -->
  <rect x="60" y="40" width="260" height="90" rx="10" fill="#0B1F2A"/>
  <text x="190" y="78" text-anchor="middle" fill="#F4F1EA" font-size="17" font-weight="700">Next.js App Router</text>
  <text x="190" y="102" text-anchor="middle" fill="#9FB8B0" font-size="13">React · Tailwind · shadcn/ui · PWA</text>

  <!-- Middleware -->
  <rect x="60" y="160" width="260" height="70" rx="10" fill="#1F9D77"/>
  <text x="190" y="190" text-anchor="middle" fill="#0B1F2A" font-size="15" font-weight="700">Middleware</text>
  <text x="190" y="210" text-anchor="middle" fill="#0B1F2A" font-size="12">Session refresh · route + role guard</text>

  <!-- API routes -->
  <rect x="60" y="260" width="260" height="130" rx="10" fill="#FFFFFF" stroke="#0B1F2A" stroke-width="1.5"/>
  <text x="190" y="286" text-anchor="middle" font-size="15" font-weight="700" fill="#0B1F2A">API Routes</text>
  <text x="80" y="310" font-size="12.5" fill="#3A4A46">/api/payments/initialize</text>
  <text x="80" y="330" font-size="12.5" fill="#3A4A46">/api/payments/verify</text>
  <text x="80" y="350" font-size="12.5" fill="#3A4A46">/api/payments/webhook</text>
  <text x="80" y="370" font-size="12.5" fill="#3A4A46">/api/ai/generate</text>

  <!-- Supabase -->
  <rect x="440" y="60" width="260" height="180" rx="10" fill="#E8B23D"/>
  <text x="570" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#0B1F2A">Supabase</text>
  <text x="460" y="120" font-size="13" fill="#0B1F2A">• Postgres + RLS</text>
  <text x="460" y="144" font-size="13" fill="#0B1F2A">• Auth (email, Google OAuth)</text>
  <text x="460" y="168" font-size="13" fill="#0B1F2A">• Storage</text>
  <text x="460" y="192" font-size="13" fill="#0B1F2A">• Realtime</text>
  <text x="460" y="216" font-size="13" fill="#0B1F2A">• Edge Functions</text>

  <!-- Cloudinary -->
  <rect x="440" y="260" width="260" height="70" rx="10" fill="#FFFFFF" stroke="#0B1F2A" stroke-width="1.5"/>
  <text x="570" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#0B1F2A">Cloudinary</text>
  <text x="570" y="310" text-anchor="middle" font-size="12" fill="#3A4A46">Optimized image CDN</text>

  <!-- Paystack -->
  <rect x="440" y="350" width="260" height="70" rx="10" fill="#FFFFFF" stroke="#0B1F2A" stroke-width="1.5"/>
  <text x="570" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#0B1F2A">Paystack</text>
  <text x="570" y="400" text-anchor="middle" font-size="12" fill="#3A4A46">Payments · wallet · subscriptions</text>

  <!-- AI layer -->
  <rect x="820" y="60" width="220" height="360" rx="10" fill="#0B1F2A"/>
  <text x="930" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#F4F1EA">AI Provider Layer</text>
  <text x="930" y="112" text-anchor="middle" font-size="11" fill="#9FB8B0">(independent failover)</text>
  <g font-size="12.5" fill="#F4F1EA">
    <text x="850" y="140">1. Claude (Anthropic)</text>
    <text x="850" y="165">2. OpenAI</text>
    <text x="850" y="190">3. Gemini</text>
    <text x="850" y="215">4. Groq</text>
    <text x="850" y="240">5. Together AI</text>
    <text x="850" y="265">6. OpenRouter</text>
    <text x="850" y="290">7. Cohere</text>
    <text x="850" y="315">8. DeepSeek</text>
  </g>
  <text x="930" y="350" text-anchor="middle" font-size="11.5" fill="#E8B23D">Missing key or failed call →</text>
  <text x="930" y="368" text-anchor="middle" font-size="11.5" fill="#E8B23D">next provider, automatically</text>

  <!-- arrows -->
  <line x1="190" y1="130" x2="190" y2="160" stroke="#5B7268" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="230" x2="190" y2="260" stroke="#5B7268" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="300" x2="440" y2="150" stroke="#5B7268" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="320" x2="440" y2="295" stroke="#5B7268" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="345" x2="440" y2="385" stroke="#5B7268" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="370" x2="820" y2="240" stroke="#5B7268" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Deployment strip -->
  <rect x="60" y="470" width="980" height="110" rx="10" fill="#FFFFFF" stroke="#0B1F2A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="90" y="500" font-size="15" font-weight="700" fill="#0B1F2A">Deployment</text>
  <text x="90" y="528" font-size="13" fill="#3A4A46">Cloudflare Pages — Next.js app served at the edge, connects directly to Supabase, Paystack, and AI providers</text>
  <text x="90" y="550" font-size="13" fill="#3A4A46">over the network. No server infrastructure to manage; environment variables set in the Pages dashboard.</text>
</svg>
